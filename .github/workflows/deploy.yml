# Promote beta -> staging, main -> production for both frontend
# (Vercel) and backend (Render). Runs only after CI + migration
# checks pass for the same SHA -- the `workflow_run` trigger gates
# on the upstream workflows by name.
#
# IMPORTANT: enable this only AFTER disabling auto-deploy in the
# Vercel and Render dashboards for these branches. Otherwise you
# get duplicate deploys racing each other.
#
# Required repo secrets (set via `gh secret set`):
#   VERCEL_TOKEN          - personal token from Vercel account
#   VERCEL_ORG_ID         - found in .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID     - same source
#   RENDER_HOOK_STAGING   - Render deploy hook URL for the beta service
#   RENDER_HOOK_PROD      - Render deploy hook URL for the main service

name: Deploy

on:
  workflow_run:
    workflows: ["CI", "Migration check (all tenants)"]
    types: [completed]
    branches: [beta, main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  vercel:
    name: vercel (${{ github.event.workflow_run.head_branch }})
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    defaults:
      run:
        working-directory: frontend

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      IS_PROD: ${{ github.event.workflow_run.head_branch == 'main' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel env (prod)
        if: env.IS_PROD == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel env (preview)
        if: env.IS_PROD == 'false'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ env.IS_PROD == 'true' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt ${{ env.IS_PROD == 'true' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

  render:
    name: render (${{ github.event.workflow_run.head_branch }})
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ github.event.workflow_run.head_branch == 'main' && secrets.RENDER_HOOK_PROD || secrets.RENDER_HOOK_STAGING }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Render deploy hook secret not set for branch ${{ github.event.workflow_run.head_branch }}"
            exit 1
          fi
          curl -fsSL -X POST "$HOOK"
          echo "✓ Render deploy triggered for ${{ github.event.workflow_run.head_branch }}"
