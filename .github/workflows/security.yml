# Secret scanning + dependency audits. Runs on every push to the
# CI/CD branches and once a week to catch newly disclosed CVEs
# even when the code hasn't changed.
#
# - gitleaks: scans the diff for committed secrets (API keys,
#   tokens, private keys). Fails the build on a positive hit.
# - pip-audit: checks backend/requirements.txt against the PyPI
#   vulnerability database.
# - npm audit: checks frontend dependencies. Warn-only (audit
#   noise from transitive deps would block every PR otherwise);
#   bump severity to fail when the tree is clean.

name: Security

on:
  push:
    branches: [development, beta, main]
  pull_request:
    branches: [development, beta, main]
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    name: pip-audit (backend deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit backend/requirements.txt
        run: pip-audit -r backend/requirements.txt --strict

  npm-audit:
    name: npm audit (frontend deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Audit (high+ only)
        run: npm audit --audit-level=high
