# Backend tests + frontend lint/build for every branch in the
# development -> beta -> main promotion path. Status checks are
# wired into branch protection in the repo settings; if a job here
# turns red the merge button stays disabled.

name: CI

on:
  push:
    branches: [development, beta, main]
  pull_request:
    branches: [development, beta, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default — every job in this workflow only checks out code
# and runs tests/lint, so contents:read is enough. Override per-job if a
# future step ever needs to write back to the repo (CodeQL alerts #11, #13).
permissions:
  contents: read

jobs:
  # NOTE: the historic tests in backend/tests/test_api.py + siblings are
  # integration tests that need a seeded tenant DB and a running uvicorn
  # server — they're NOT what this job runs. The accounting suite under
  # backend/tests/accounting/ is self-contained: it spins up its own test
  # database, creates the schema via Base.metadata.create_all, and seeds
  # the minimum reference data. Migration-check.yml is still our
  # canonical backend-boot signal.

  backend-accounting:
    name: backend (accounting unit tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medifleet
          POSTGRES_PASSWORD: medifleet
          POSTGRES_DB: hms_master
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U medifleet -d hms_master"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://medifleet:medifleet@localhost:5432/hms_master
      ACCOUNTING_TEST_DB_URL: postgresql://medifleet:medifleet@localhost:5432/hms_accounting_test
      # CI-only test values. Settings validators require SECRET_KEY >= 32 bytes
      # and ENCRYPTION_KEY with > 8 distinct chars. These are never used to
      # mint real tokens or encrypt real data.
      SECRET_KEY: ci-test-secret-key-must-be-at-least-32-bytes-not-for-prod-use
      ENCRYPTION_KEY: "ci-test-fernet-key-32bytes-distinct-AbCdEfGhIjKlMnOpQrSt="
      CORS_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps + pytest
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run accounting tests
        working-directory: backend
        run: pytest tests/accounting/ -q

  frontend:
    name: frontend (lint + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
