# Render Blueprint — HMS backend
#
# How the seed runs once on deploy:
#   The start command (render-start.sh) checks for seed_superadmin.py before
#   each uvicorn boot. The seed itself is idempotent — it skips inserting the
#   superadmin row when one already exists — so leaving the file in place
#   across normal redeploys is harmless.
#
#   To "remove the seed after first deploy" as planned:
#     1. Push this branch — Render runs the seed automatically on first boot.
#     2. Sign in at /superadmin/login with the seed credentials.
#     3. Delete backend/seed_superadmin.py from the repo and push again.
#     4. Render redeploys; render-start.sh sees the file is gone and skips
#        straight to uvicorn.
#
# Required environment variables (set as secrets in the Render dashboard):
#   DATABASE_URL              — managed Postgres connection string
#   SECRET_KEY                — JWT signing key (>=32 bytes high entropy)
#   ENCRYPTION_KEY            — Fernet key for at-rest secrets (44-char b64)
#   PUBLIC_BASE_URL           — https://hms-2-3o0p.onrender.com (callback URL)
#   PAYHERO_USERNAME / PAYHERO_PASSWORD / PAYHERO_CHANNEL_ID — aggregator creds
#   PAYHERO_WEBHOOK_SECRET    — HMAC shared secret for incoming callbacks
#   PAYHERO_WEBHOOK_CIDRS     — comma-separated allow-list (e.g. 196.201.0.0/16)
#   PASSWORD_PEPPER           — server-side pepper added before Argon2id hash
#   SEED_SUPERADMIN_EMAIL     — optional, defaults to superadmin@medifleet.co.ke
#   SEED_SUPERADMIN_PASSWORD  — REQUIRED, must be >=16 chars and not a known
#                               placeholder; the seed script refuses to run
#                               with a missing/weak value (SEC-002).

services:
  - type: web
    name: hms-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Invoke via `bash` explicitly so the executable bit on the file isn't
    # required (git mode bits get lost on Windows checkouts and mode-stripping
    # archive uploads). Render's working directory is set by `rootDir` above,
    # so this resolves to backend/render-start.sh.
    startCommand: bash render-start.sh
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Authoritative production flag. Drives cookie security flags
      # (secure=true, samesite=none) so the Vercel-hosted frontend can
      # round-trip the HttpOnly session cookie through the Render API
      # over HTTPS. Without this set, cookies are issued with samesite=lax
      # and the cross-domain login silently fails after a refresh.
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      # Fernet key for at-rest secret encryption (per-tenant Pay Hero
      # credentials, future encrypted fields). 44-byte URL-safe base64.
      # MUST be declared here as sync:false — otherwise a blueprint resync
      # silently drops the dashboard value and the next deploy crashes at
      # `Settings()` construction (settings.py refuses to boot without it).
      # NEVER use generateValue:true here — rotating this key makes every
      # previously-encrypted row permanently unreadable.
      - key: ENCRYPTION_KEY
        sync: false
      # Server-side pepper HMACed into passwords before Argon2id. Same
      # warning applies: regenerating invalidates every existing login.
      - key: PASSWORD_PEPPER
        sync: false
      # Callback URL Pay Hero hits for STK push results. Production value:
      # https://hms-2-3o0p.onrender.com (the canonical Render host).
      - key: PUBLIC_BASE_URL
        sync: false
      # Pay Hero aggregator credentials. All four required for the live
      # PAYHERO_ENV=production path; empty values force sandbox behaviour.
      - key: PAYHERO_ENV
        sync: false
      - key: PAYHERO_USERNAME
        sync: false
      - key: PAYHERO_PASSWORD
        sync: false
      - key: PAYHERO_CHANNEL_ID
        sync: false
      - key: PAYHERO_WEBHOOK_SECRET
        sync: false
      - key: PAYHERO_WEBHOOK_CIDRS
        sync: false
      # Lock CORS to the production SPA hostnames. CORS allow-lists are not
      # secrets, so hardcoding here keeps the blueprint authoritative and
      # the migration durable across redeploys. Order: canonical www, apex
      # (covers the 308 round-trip where some browsers send Origin before
      # following the redirect), then the legacy vercel.app alias used by
      # preview deployments. Add preview-specific origins via the dashboard
      # when needed; dashboard-set values still win against the blueprint.
      - key: CORS_ORIGINS
        value: "https://www.medifleet.app,https://medifleet.app,https://hms-2-psi.vercel.app"
      # Optional: Redis URL for WebSocket pub/sub fan-out across workers.
      - key: REDIS_URL
        sync: false
      - key: SEED_SUPERADMIN_EMAIL
        sync: false
      - key: SEED_SUPERADMIN_PASSWORD
        sync: false
