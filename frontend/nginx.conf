# MediFleet frontend — nginx serves the Vite bundle and reverse-proxies API
# and WebSocket traffic to the FastAPI backend container.

upstream medifleet_backend {
    # Resolved against the docker compose network. In other environments,
    # override via a sed/template step at deploy time.
    server backend:8000;
}

server {
    listen 80 default_server;
    server_name _;

    # SPA build artefacts.
    root /usr/share/nginx/html;
    index index.html;

    # Reasonable defaults for an internal LAN deployment.
    client_max_body_size 25m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Hashed asset bundles can cache for a year — index.html cannot, because
    # we ship new bundle filenames on every release and stale index.html would
    # pin users to the previous deploy.
    location ~* \.(?:js|css|woff2?|ttf|eot|ico|svg|png|jpe?g|gif|webp|map)$ {
        try_files $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # FastAPI REST surface.
    location /api/ {
        proxy_pass         http://medifleet_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket transport (notifications, live queue, etc.).
    location /ws/ {
        proxy_pass         http://medifleet_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 1h;
    }

    # SPA fallback — anything else (deep links) returns index.html.
    # Security headers live here because nginx's `add_header` does NOT inherit
    # into a location block that defines its own add_header (the Cache-Control
    # line below), so the set must be duplicated wherever HTML is returned.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none'; form-action 'self'; base-uri 'none'; object-src 'none'; media-src 'self'" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
    }
}
